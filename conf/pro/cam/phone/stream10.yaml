  - conf/pro/cam/stream_root.yaml
log:
  analysis: False
stream:
  cam_id: 10  # 摄像头编号
#  url: res/videos/phone/phone.mp4  # 取流地址（输入）
  url: rtsp://admin:zwjs1357@192.168.1.120:554/h264/ch1/main/av_stream_phone10  # 取流地址（输入）
  # 画面缩放系数
  scale: 1
