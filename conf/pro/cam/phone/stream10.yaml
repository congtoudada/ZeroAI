      conf: conf/pro/algorithm/detection/yolox/yolox_phone_10.yaml
    - path: lib/mot/bytetrack_module/bytetrack/zero/component/bytetrack_comp.py  # bytetrack(人)
      conf: conf/pro/algorithm/mot/bytetrack/bytetrack_phone_person_10.yaml
    - path: lib/mot/bytetrack_module/bytetrack/zero/component/bytetrack_comp.py  # bytetrack(手机)
      conf: conf/pro/algorithm/mot/bytetrack/bytetrack_phone_10.yaml
    - path: lib/business/phone/component/PhoneComponent.py  # 手机检测业务
