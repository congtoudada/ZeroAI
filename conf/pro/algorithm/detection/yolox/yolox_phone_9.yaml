INCLUDE:
  - conf/pro/algorithm/detection/yolox/yolox_root.yaml
  - conf/pro/algorithm/detection/labels/detection_labels_phone.yaml
input_port:  # 输入端口 eg.SharedKey.STREAM_FRAME_INFO-camera1
  - camera9
output_port: yolox_phone  # 输出端口 eg.SharedKey.STREAM_FRAME_INFO-camera1-yolox
yolox:
  args:
    expn: phone  # 实验名称
    path: null  # 取流路径（为None则通过内部框架取流）
    exp_file: conf/pro/algorithm/detection/yolox/exps/yolox_s_phone.py  # 通过.py选择模型
    ckpt: pretrained/detection/yolox/phone/phone_ckpt.pth # 推理用模型权重文件
    conf: 0.25 # test conf
