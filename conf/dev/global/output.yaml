stream:
  output_dir: output/stream  # 输出目录
  save_video:
    enable: False  # 是否保存视频
    width: 960  # 输出视频宽
    height: 540  # 输出视频高
    fps: 24  # 输出视频帧率
  draw_vis:
    enable: False  # 是否可视化（linux默认不显示）
  export_img:
    enable: True  # 导出图片
  web:
    enable: True  # web请求
  rtsp:
    enable: False
    url: rtsp://127.0.0.1:554/video


