    exp_file: conf/algorithm/detection/yolox/exps/yolox_s_phone.py  # 通过.py选择模型
    ckpt: pretrained/detection/yolox/phone/best_ckpt.pth # 推理用模型权重文件
    conf: 0.4 # test conf
