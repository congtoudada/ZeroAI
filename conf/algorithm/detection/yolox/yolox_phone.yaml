  - conf/algorithm/detection/detection_labels_phone2.yaml
input_port:  # 输入端口 eg.SharedKey.STREAM_FRAME_INFO-camera1
  - camera1
  # - camera2
output_port: yolox2  # 输出端口 eg.SharedKey.STREAM_FRAME_INFO-camera1-yolox
yolox:
  args:
    expn: phone  # 实验名称
    path: null  # 取流路径（为None则通过内部框架取流）
