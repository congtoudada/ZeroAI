INCLUDE:
  - conf/global/log.yaml
  - conf/global/output.yaml
stream:
  output_dir: output/business/count  # 输出目录
  save_video:
    enable: True  # 是否保存视频
  draw_vis:
    enable: True  # 是否可视化
item:
  base: 0
  valid_frames: 5 # 对象稳定出现多少帧，才开始计算
  lost_frames: 60  # 对象消失多少帧则丢弃 (业务层)
card:
  lost_frames: 200 # card区的obj消失多少帧则丢弃,根据从car区到gate区所需时间确定
draw_warning_time: 10 # 警告信息显示的帧数
